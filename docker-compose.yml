services:
  tg-bot-api:
    container_name: tg2max-bot-api
    image: aiogram/telegram-bot-api:latest
    ports:
      - "127.0.0.1:47819:8081"
    volumes:
      - /home/arkosh/.local/share/tg2max-bot-api:/var/lib/telegram-bot-api
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: "true"
    entrypoint: >
      sh -c "umask 0022 && exec telegram-bot-api
      --dir=/var/lib/telegram-bot-api
      --temp-dir=/tmp/telegram-bot-api
      --http-port=8081
      --local
      --api-id=${TELEGRAM_API_ID}
      --api-hash=${TELEGRAM_API_HASH}"
    restart: unless-stopped

  tg2max-bot:
    build:
      context: .
      dockerfile: Dockerfile.local
    depends_on:
      - tg-bot-api
    environment:
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      MAX_TOKEN: "${MAX_TOKEN}"
      TG_API_ENDPOINT: "http://tg-bot-api:8081"
      TG_API_FILES_DIR: "/tg-files"
      ALLOWED_USER_IDS: "${ALLOWED_USER_IDS}"
    volumes:
      - /tmp/tg2max:/tmp/tg2max
      - /home/arkosh/.local/share/tg2max-bot-api:/tg-files:ro
    restart: unless-stopped
