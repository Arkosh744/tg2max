{{define "stats_cards"}}
<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">

    <!-- Total users -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <div class="flex items-start justify-between">
            <div>
                <p class="text-sm font-medium text-slate-400">Пользователей</p>
                <p class="text-3xl font-bold text-white mt-1">{{.Stats.TotalUsers}}</p>
            </div>
            <div class="p-2 bg-blue-900/40 rounded-lg">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Total migrations -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <div class="flex items-start justify-between">
            <div>
                <p class="text-sm font-medium text-slate-400">Миграций</p>
                <p class="text-3xl font-bold text-white mt-1">{{.Stats.TotalMigrations}}</p>
            </div>
            <div class="p-2 bg-purple-900/40 rounded-lg">
                <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Total sent -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <div class="flex items-start justify-between">
            <div>
                <p class="text-sm font-medium text-slate-400">Отправлено</p>
                <p class="text-3xl font-bold text-white mt-1">{{.Stats.TotalSent}}</p>
            </div>
            <div class="p-2 bg-green-900/40 rounded-lg">
                <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Total errors -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <div class="flex items-start justify-between">
            <div>
                <p class="text-sm font-medium text-slate-400">Ошибок</p>
                <p class="text-3xl font-bold text-white mt-1">{{.Stats.Failed}}</p>
            </div>
            <div class="p-2 bg-red-900/40 rounded-lg">
                <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>
    </div>

</div>
{{end}}
