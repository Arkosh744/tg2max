<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tg2max Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: var(--tg-theme-bg-color, #0f172a); color: var(--tg-theme-text-color, #e2e8f0); }
        .card { background: var(--tg-theme-secondary-bg-color, #1e293b); }
        .hint { color: var(--tg-theme-hint-color, #94a3b8); }
        .link { color: var(--tg-theme-link-color, #60a5fa); }
        .btn { background: var(--tg-theme-button-color, #3b82f6); color: var(--tg-theme-button-text-color, #fff); }
        @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.6} }
        .pulse-bar { animation: pulse-bar 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen p-3 pb-20">

    <!-- Tabs -->
    <div class="flex gap-1 mb-4 rounded-xl card p-1" id="tabs">
        <button onclick="showTab('dashboard')" data-tab="dashboard" class="flex-1 py-2 px-3 rounded-lg text-xs font-semibold btn">Dashboard</button>
        <button onclick="showTab('migrations')" data-tab="migrations" class="flex-1 py-2 px-3 rounded-lg text-xs font-semibold opacity-60">Миграции</button>
        <button onclick="showTab('users')" data-tab="users" class="flex-1 py-2 px-3 rounded-lg text-xs font-semibold opacity-60">Юзеры</button>
    </div>

    <!-- Dashboard -->
    <div id="tab-dashboard">
        <!-- Stats cards -->
        <div class="grid grid-cols-2 gap-2 mb-4" id="stats-grid">
            <div class="card rounded-xl p-3">
                <p class="text-xs hint">Пользователей</p>
                <p class="text-xl font-bold" id="s-users">—</p>
            </div>
            <div class="card rounded-xl p-3">
                <p class="text-xs hint">Миграций</p>
                <p class="text-xl font-bold" id="s-migrations">—</p>
            </div>
            <div class="card rounded-xl p-3">
                <p class="text-xs hint">Отправлено</p>
                <p class="text-xl font-bold" id="s-sent">—</p>
            </div>
            <div class="card rounded-xl p-3">
                <p class="text-xs hint">Ошибок</p>
                <p class="text-xl font-bold" id="s-failed">—</p>
            </div>
        </div>

        <!-- Active migration -->
        <div id="active-box" class="card rounded-xl p-4 mb-4 hidden">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-2 h-2 rounded-full bg-blue-400 pulse-bar"></div>
                <span class="text-sm font-semibold" id="a-chat">—</span>
                <span class="text-xs hint ml-auto" id="a-speed">—</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2 mb-1">
                <div class="bg-blue-500 h-2 rounded-full transition-all" id="a-bar" style="width:0%"></div>
            </div>
            <div class="flex justify-between text-xs hint">
                <span id="a-progress">0/0</span>
                <span id="a-eta">—</span>
            </div>
        </div>

        <!-- Recent migrations -->
        <h3 class="text-sm font-semibold mb-2">Последние миграции</h3>
        <div id="recent-list" class="space-y-2"></div>
    </div>

    <!-- Migrations list -->
    <div id="tab-migrations" class="hidden">
        <div class="flex gap-1 mb-3 flex-wrap" id="mig-filters">
            <button onclick="loadMigrations('')" class="px-3 py-1 rounded-lg text-xs btn">Все</button>
            <button onclick="loadMigrations('completed')" class="px-3 py-1 rounded-lg text-xs card hint">Готово</button>
            <button onclick="loadMigrations('failed')" class="px-3 py-1 rounded-lg text-xs card hint">Ошибки</button>
            <button onclick="loadMigrations('started')" class="px-3 py-1 rounded-lg text-xs card hint">Активные</button>
        </div>
        <div id="mig-list" class="space-y-2"></div>
        <div id="mig-pager" class="flex justify-center gap-2 mt-3"></div>
    </div>

    <!-- Users list -->
    <div id="tab-users" class="hidden">
        <div id="users-list" class="space-y-2"></div>
        <div id="users-pager" class="flex justify-center gap-2 mt-3"></div>
    </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const initData = tg.initData;
const headers = { 'X-Telegram-Init-Data': initData };

async function api(path) {
    const r = await fetch(path, { headers });
    if (!r.ok) return null;
    return r.json();
}

// --- Tabs ---
function showTab(name) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    document.querySelectorAll('#tabs button').forEach(btn => {
        if (btn.dataset.tab === name) {
            btn.classList.add('btn');
            btn.classList.remove('opacity-60', 'card', 'hint');
        } else {
            btn.classList.remove('btn');
            btn.classList.add('opacity-60');
        }
    });
    if (name === 'migrations') loadMigrations('');
    if (name === 'users') loadUsers(1);
}

// --- Dashboard ---
async function loadDashboard() {
    const [stats, live] = await Promise.all([api('/api/stats'), api('/api/live')]);
    if (stats) {
        document.getElementById('s-users').textContent = stats.total_users;
        document.getElementById('s-migrations').textContent = stats.total_migrations;
        document.getElementById('s-sent').textContent = formatNum(stats.total_sent);
        document.getElementById('s-failed').textContent = stats.failed;
    }
    updateLive(live);
    loadRecent();
}

async function loadRecent() {
    const data = await api('/api/migrations?per_page=5');
    if (!data || !data.migrations) return;
    const el = document.getElementById('recent-list');
    el.innerHTML = data.migrations.map(m => migCard(m)).join('');
}

function updateLive(live) {
    const box = document.getElementById('active-box');
    if (!live) { box.classList.add('hidden'); return; }
    box.classList.remove('hidden');
    document.getElementById('a-chat').textContent = live.max_chat_name || 'Миграция';
    document.getElementById('a-bar').style.width = live.percent + '%';
    document.getElementById('a-progress').textContent = live.sent_messages + '/' + live.total_messages;
    document.getElementById('a-eta').textContent = live.eta || '—';
    document.getElementById('a-speed').textContent = live.speed ? live.speed.toFixed(1) + ' msg/s' : '';
}

// --- Migrations ---
let migStatus = '', migPage = 1;
async function loadMigrations(status, page) {
    migStatus = status || '';
    migPage = page || 1;
    const data = await api('/api/migrations?status=' + migStatus + '&page=' + migPage);
    if (!data) return;
    document.getElementById('mig-list').innerHTML =
        (data.migrations || []).map(m => migCard(m)).join('') || '<p class="text-center hint text-sm py-8">Нет миграций</p>';
    renderPager('mig-pager', data.page, data.total_pages, p => loadMigrations(migStatus, p));
}

// --- Users ---
async function loadUsers(page) {
    const data = await api('/api/users?page=' + (page || 1));
    if (!data) return;
    document.getElementById('users-list').innerHTML =
        (data.users || []).map(u => `
        <div class="card rounded-xl p-3">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm font-semibold">${esc(u.FirstName)} ${esc(u.LastName)}</p>
                    <p class="text-xs hint">@${esc(u.Username)} · ID: ${u.TelegramID}</p>
                </div>
                <span class="text-xs hint">${u.MigrationCount} миг.</span>
            </div>
        </div>`).join('') || '<p class="text-center hint text-sm py-8">Нет пользователей</p>';
    renderPager('users-pager', data.page, data.total_pages, loadUsers);
}

// --- Helpers ---
function migCard(m) {
    const badge = m.Status === 'completed' ? 'bg-green-500/20 text-green-400' :
                  m.Status === 'failed' ? 'bg-red-500/20 text-red-400' :
                  m.Status === 'cancelled' ? 'bg-yellow-500/20 text-yellow-400' :
                  'bg-blue-500/20 text-blue-400';
    const label = {completed:'Готово',failed:'Ошибка',cancelled:'Отменена',started:'В процессе'}[m.Status] || m.Status;
    const type = m.SourceType === 'clone' ?
        '<span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-purple-900/50 text-purple-300">Clone</span>' :
        '<span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-blue-900/50 text-blue-300">ZIP</span>';
    return `<div class="card rounded-xl p-3">
        <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">${type}<span class="text-sm font-semibold">${esc(m.MaxChatName || 'Chat ' + m.MaxChatID)}</span></div>
            <span class="px-2 py-0.5 rounded-full text-[10px] font-medium ${badge}">${label}</span>
        </div>
        <div class="flex justify-between text-xs hint">
            <span>${m.SentMessages}/${m.TotalMessages} сообщений</span>
            <span>${formatDate(m.StartedAt)}</span>
        </div>
        ${m.SourceChannel ? '<p class="text-[10px] hint mt-1">из: ' + esc(m.SourceChannel) + '</p>' : ''}
    </div>`;
}

function renderPager(elId, page, total, fn) {
    if (total <= 1) { document.getElementById(elId).innerHTML = ''; return; }
    let html = '';
    if (page > 1) html += `<button onclick="(${fn.name})(${page-1})" class="px-3 py-1 rounded-lg text-xs card hint">&larr;</button>`;
    html += `<span class="px-3 py-1 text-xs hint">${page}/${total}</span>`;
    if (page < total) html += `<button onclick="(${fn.name})(${page+1})" class="px-3 py-1 rounded-lg text-xs card hint">&rarr;</button>`;
    document.getElementById(elId).innerHTML = html;
}

function formatNum(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n;
}
function formatDate(s) {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' +
           d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Init & polling ---
loadDashboard();
setInterval(async () => {
    const live = await api('/api/live');
    updateLive(live);
}, 3000);
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
