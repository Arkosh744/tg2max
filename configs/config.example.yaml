# =============================================================================
# tg2max configuration
# =============================================================================
# Конфиг для CLI (tg2max) и бота (tg2max-bot) частично пересекается.
# CLI использует: max_token, rate_limit_rps, cursor_file, mappings.
# Бот использует: telegram_token, max_token, rate_limit_rps,
#                 temp_dir, tg_api_endpoint, tg_api_files_dir.

# =============================================================================
# Max Bot API
# =============================================================================

# Токен Max-бота (обязательно). Создать через @MasterBot в Max.
# Переменная окружения MAX_TOKEN имеет приоритет.
max_token: "your-max-bot-token"

# =============================================================================
# Telegram (только для бота tg2max-bot)
# =============================================================================

# Токен Telegram-бота от @BotFather (обязательно для бота)
# Переменная окружения TELEGRAM_TOKEN имеет приоритет.
telegram_token: "123456:ABC-your-telegram-bot-token"

# Local Bot API сервер для скачивания файлов >20 МБ (до 2 ГБ).
# Поднимается через docker compose up -d.
# tg_api_endpoint: "http://localhost:47819"

# Путь на хосте к volume Local Bot API (для доступа к скачанным файлам).
# Должен совпадать с volumes в docker-compose.yml.
# tg_api_files_dir: "/home/user/.local/share/tg2max-bot-api"

# =============================================================================
# Общие настройки
# =============================================================================

# Лимит запросов в секунду к Max API (по умолчанию 25).
rate_limit_rps: 1

# =============================================================================
# CLI: курсор и маппинги (только для tg2max)
# =============================================================================

# Файл для сохранения прогресса. При сбое миграция продолжится с этого места.
# По умолчанию: cursor.json
cursor_file: "cursor.json"

# Маппинг экспортов Telegram на чаты Max.
# name        -- произвольное уникальное имя (для логов и курсора)
# tg_export_path -- путь к result.json из экспорта Telegram Desktop
# max_chat_id    -- ID чата в Max (узнать: добавить бота в чат, отправить сообщение, взять из логов)
mappings:
  - name: "Dev Chat"
    tg_export_path: "/path/to/exports/dev_chat/result.json"
    max_chat_id: 123456789

  - name: "General"
    tg_export_path: "/path/to/exports/general/result.json"
    max_chat_id: 987654321

# =============================================================================
# Бот: временные файлы (только для tg2max-bot)
# =============================================================================

# Директория для распакованных ZIP-архивов и временных файлов.
# По умолчанию: системная tmp.
# temp_dir: "/tmp/tg2max"

# =============================================================================
# База данных (только для tg2max-bot, опционально)
# =============================================================================

# Путь к SQLite базе для логирования пользователей и миграций.
# Если не задан — логирование отключено (бот работает как раньше).
# Переменная окружения DB_PATH имеет приоритет.
# db_path: "/tmp/tg2max/tg2max.db"
