{{template "layout" .}}

{{define "content"}}
<div class="space-y-6">

    <div>
        <h1 class="text-2xl font-bold text-white">Дашборд</h1>
        <p class="text-slate-400 text-sm mt-1">Обзор системы миграции</p>
    </div>

    <!-- SSE connection for live updates, polling as fallback -->
    <div hx-ext="sse" sse-connect="/admin/events">

        <!-- Stats cards -->
        <div
            id="stats-cards"
            sse-swap="stats"
            hx-swap="innerHTML"
            hx-get="/admin/partials/stats"
            hx-trigger="load, every 30s">
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                {{range $i := (seq 1 4)}}
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-5 animate-pulse">
                    <div class="h-4 bg-slate-700 rounded w-1/2 mb-3"></div>
                    <div class="h-8 bg-slate-700 rounded w-1/3"></div>
                </div>
                {{end}}
            </div>
        </div>

        <!-- Active migration -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-white mb-3">Активная миграция</h2>
            <div
                id="active-migration"
                sse-swap="active"
                hx-swap="innerHTML"
                hx-get="/admin/partials/active"
                hx-trigger="load, every 5s">
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-5 animate-pulse">
                    <div class="h-4 bg-slate-700 rounded w-1/3 mb-3"></div>
                    <div class="h-3 bg-slate-700 rounded w-full mb-2"></div>
                    <div class="h-3 bg-slate-700 rounded w-4/5"></div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="mt-6">
            {{template "chart_data" .}}
        </div>

        <!-- Recent migrations -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-white mb-3">Последние миграции</h2>
            <div
                id="recent-migrations"
                sse-swap="recent"
                hx-swap="innerHTML"
                hx-get="/admin/partials/recent"
                hx-trigger="load, every 30s">
                <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden animate-pulse">
                    <div class="p-5 space-y-3">
                        {{range $i := (seq 1 5)}}
                        <div class="h-4 bg-slate-700 rounded w-full"></div>
                        {{end}}
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>
{{end}}
