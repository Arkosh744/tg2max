{{define "layout"}}<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — tg2max</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            750: '#293548',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <nav class="bg-slate-800 border-b border-slate-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/admin/" class="text-blue-400 font-bold text-xl tracking-tight hover:text-blue-300 transition-colors">
                        tg2max
                    </a>
                    <div class="hidden md:flex items-center space-x-1">
                        <a href="/admin/"
                           class="px-3 py-2 rounded-md text-sm font-medium transition-colors {{if eq .ActiveNav "dashboard"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                            Дашборд
                        </a>
                        <a href="/admin/migrations"
                           class="px-3 py-2 rounded-md text-sm font-medium transition-colors {{if eq .ActiveNav "migrations"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                            Миграции
                        </a>
                        <a href="/admin/users"
                           class="px-3 py-2 rounded-md text-sm font-medium transition-colors {{if eq .ActiveNav "users"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                            Пользователи
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <form method="POST" action="/admin/logout">
                        <button type="submit"
                                class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:bg-red-700 hover:text-white transition-colors">
                            Выйти
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div class="md:hidden border-t border-slate-700">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="/admin/"
                   class="block px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "dashboard"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                    Дашборд
                </a>
                <a href="/admin/migrations"
                   class="block px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "migrations"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                    Миграции
                </a>
                <a href="/admin/users"
                   class="block px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "users"}}bg-slate-700 text-white{{else}}text-slate-300 hover:bg-slate-700 hover:text-white{{end}}">
                    Пользователи
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {{template "content" .}}
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <p class="text-sm text-slate-400 text-center">
                tg2max &middot; Аптайм: <span class="text-slate-300">{{.Uptime}}</span>
            </p>
        </div>
    </footer>

</body>
</html>
{{end}}
